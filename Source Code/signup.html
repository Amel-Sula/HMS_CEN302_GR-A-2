<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grand HMS – Sign Up</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="auth-nav">
  <a href="index.html">Sign In</a>
  <a href="signup.html">Sign Up</a>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <h1>Sign Up</h1>
    <div id="error-msg"></div>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" class="form-control" placeholder="Value" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" class="form-control" placeholder="Value" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" class="form-control" placeholder="Value" />
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirm" class="form-control" placeholder="Value" />
    </div>
    <button class="btn btn-dark btn-full mt-3" id="signup-btn">Sign Up</button>
    <div class="mt-3 text-sm text-muted">
      Already have an account? <a href="index.html" style="color:#111;font-weight:600;">Sign In</a>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="js/app.js"></script>
<script src="js/pages/signup.js"></script>
</body>
</html>
