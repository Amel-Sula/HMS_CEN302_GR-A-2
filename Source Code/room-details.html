<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grand HMS – Room Details</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app-layout">
  <div id="sidebar" class="sidebar"></div>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title">Room Details</div>
      <div class="topbar-user" id="topbar-user"></div>
    </div>
    <div class="page-body">
      <a href="rooms.html" class="btn btn-outline btn-sm mb-3" style="display:inline-flex;">← Back to Rooms</a>
      <div id="room-detail-content"></div>
    </div>
  </div>
</div>

<!-- Booking Modal -->
<div class="modal-backdrop hidden" id="book-modal">
  <div class="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <h3>Book Room</h3>
    <div id="book-summary" style="background:#f9f9f9;border-radius:6px;padding:14px 16px;margin-bottom:16px;font-size:13.5px;line-height:1.7;"></div>
    <div class="form-group">
      <label>Check-In</label>
      <input type="date" id="book-ci" class="form-control" />
    </div>
    <div class="form-group">
      <label>Check-Out</label>
      <input type="date" id="book-co" class="form-control" />
    </div>
    <div class="form-group">
      <label>Notes (optional)</label>
      <textarea id="book-notes" class="form-control" rows="2" placeholder="Any special requests?"></textarea>
    </div>
    <div id="book-price-preview" style="font-weight:600;font-size:15px;margin-top:8px;"></div>
    <div id="book-error" class="mt-2"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="modal-cancel">Cancel</button>
      <button class="btn btn-dark" id="confirm-book">Confirm Booking</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="js/app.js"></script>
<script src="js/pages/room-details.js"></script>
</body>
</html>
