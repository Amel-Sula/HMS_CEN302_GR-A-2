<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grand HMS – My Profile</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app-layout">
  <div id="sidebar" class="sidebar"></div>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title">My Profile</div>
      <div class="topbar-user" id="topbar-user"></div>
    </div>
    <div class="page-body">
      <div class="page-header"><h2>Update Profile</h2><p>Keep your account information up to date</p></div>
      <div style="max-width:500px;">
        <div class="card">
          <div class="card-body">
            <div id="profile-msg"></div>
            <div style="text-align:center;margin-bottom:24px;">
              <div style="width:72px;height:72px;border-radius:50%;background:#e0e0e0;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 10px;">👤</div>
              <div style="font-weight:600;font-size:16px;" id="profile-name-display"></div>
              <div style="font-size:13px;color:#888;" id="profile-role-display"></div>
            </div>
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="p-name" class="form-control" />
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="p-email" class="form-control" />
            </div>
            <hr class="divider" />
            <p style="font-size:13px;font-weight:600;margin-bottom:12px;">Change Password</p>
            <div class="form-group">
              <label>Current Password</label>
              <input type="password" id="p-current-pw" class="form-control" placeholder="Leave blank to keep current" />
            </div>
            <div class="form-group">
              <label>New Password</label>
              <input type="password" id="p-new-pw" class="form-control" />
            </div>
            <button class="btn btn-dark btn-full mt-3" id="save-profile">Save Changes</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="js/app.js"></script>
<script src="js/pages/profile.js"></script>
</body>
</html>
