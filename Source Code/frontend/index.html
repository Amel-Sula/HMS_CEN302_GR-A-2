<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grand HMS – Sign In</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="auth-nav">
  <a href="index.html">Sign In</a>
  <a href="signup.html">Sign Up</a>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <h1>Sign In</h1>
    <div id="error-msg"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" class="form-control" placeholder="Value" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" class="form-control" placeholder="Value" />
    </div>
    <div class="auth-row mt-3">
      <button class="btn btn-dark" id="signin-btn">Sign In</button>
      <a href="signup.html" class="btn btn-outline">Don't have an account?<br>Sign Up</a>
    </div>
    <div class="mt-2">
      <button class="auth-link">Forgot password?</button>
    </div>
    <!-- Quick login buttons (for demo/testing only - remove in production) -->
    <!-- Uncomment below to enable quick login during development:
    <div style="margin-top:24px;padding-top:16px;border-top:1px solid #eee;">
      <p class="text-sm text-muted mb-2">Quick login (testing only):</p>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">
        <button class="btn btn-sm btn-outline quick-login" data-email="john@example.com" data-pw="guest123">Guest</button>
        <button class="btn btn-sm btn-outline quick-login" data-email="receptionist@hotel.com" data-pw="rec123">Receptionist</button>
        <button class="btn btn-sm btn-outline quick-login" data-email="admin@hotel.com" data-pw="admin123">Admin</button>
      </div>
    </div>
    -->
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="js/app.js"></script>
<script src="js/pages/signin.js"></script>
</body>
</html>
