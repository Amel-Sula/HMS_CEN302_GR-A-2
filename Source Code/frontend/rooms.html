<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grand HMS – Browse Rooms</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app-layout">
  <div id="sidebar" class="sidebar"></div>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title">Room Selection</div>
      <div class="topbar-user" id="topbar-user"></div>
    </div>
    <div class="page-body">
      <div class="page-header">
        <h2 id="welcome-msg">Welcome</h2>
        <p>Select one of our available rooms</p>
      </div>

      <!-- Search toolbar matching Figma -->
      <div class="rooms-toolbar">
        <div class="date-group">
          <label>Check-In</label>
          <div class="date-seg">
            <input type="text" name="dd" id="ci-dd" placeholder="DD" maxlength="2" />
            <input type="text" name="mm" id="ci-mm" placeholder="MM" maxlength="2" />
            <input type="text" name="yyyy" id="ci-yyyy" placeholder="YYYY" maxlength="4" />
          </div>
        </div>
        <div class="date-group" style="margin-left:16px;">
          <label>Check-Out</label>
          <div class="date-seg">
            <input type="text" name="dd" id="co-dd" placeholder="DD" maxlength="2" />
            <input type="text" name="mm" id="co-mm" placeholder="MM" maxlength="2" />
            <input type="text" name="yyyy" id="co-yyyy" placeholder="YYYY" maxlength="4" />
          </div>
        </div>
        <div style="margin-left:auto;display:flex;gap:8px;align-items:center;">
          <select id="filter-type" style="border:1px solid #e0e0e0;border-radius:6px;padding:8px 12px;font-size:13px;background:#fff;outline:none;">
            <option value="">All Types</option>
            <option value="Single">Single</option>
            <option value="Double">Double</option>
            <option value="Suite">Suite</option>
          </select>
          <button class="btn btn-dark btn-sm" id="search-btn">Search</button>
        </div>
      </div>

      <div class="rooms-grid" id="rooms-grid"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="js/app.js"></script>
<script src="js/pages/rooms.js"></script>
</body>
</html>
